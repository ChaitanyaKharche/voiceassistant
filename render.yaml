# render.yaml — Render Blueprint for one-click deployment
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: voice-scheduling-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RETELL_API_KEY
        sync: false
      - key: RETELL_AGENT_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_CALENDAR_ID
        value: primary
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.12.0"
